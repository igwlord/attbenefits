<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATT Benefit Program — Dashboard</title>
<meta name="description" content="Directorio de comercios y control de gastos del programa de beneficios AT&T Argentina — EdenRed">
<meta name="theme-color" content="#07111B">
<meta name="color-scheme" content="dark light">

<!-- CSS -->
<link rel="stylesheet" href="css/variables.css?v=14">
<link rel="stylesheet" href="css/base.css?v=14">
<link rel="stylesheet" href="css/nav.css?v=11">
<link rel="stylesheet" href="css/comercios.css?v=14">
<link rel="stylesheet" href="css/dashboard.css?v=18">
<link rel="stylesheet" href="css/gastos.css?v=19">
<link rel="stylesheet" href="css/config.css?v=19">
</head>
<body>

<!-- Skip Link -->
<a href="#main-content" class="sr-only" style="position:absolute;top:-40px;left:0;background:var(--accent);color:#fff;padding:8px 16px;z-index:1000;border-radius:0 0 8px 0;transition:top .2s" onfocus="this.style.top='0'" onblur="this.style.top='-40px'">Saltar al contenido</a>

<!-- ======== TOP NAVIGATION ======== -->
<header id="top-nav" class="top-nav" role="banner"></header>

<!-- ======== MAIN CONTENT ======== -->
<main id="main-content" class="main-content">

  <!-- ======== SECTION: DASHBOARD ======== -->
  <section id="section-dashboard" class="section fade-hide" role="tabpanel" aria-label="Dashboard">
    <div class="section__inner" id="dashboard-content">
      <!-- Rendered by dashboard.js -->
    </div>
  </section>

  <!-- ======== SECTION: COMERCIOS ======== -->
  <section id="section-comercios" class="section fade-hide" role="tabpanel" aria-label="Comercios">
    <div class="section__inner" id="comercios-content">
      <!-- Rendered by comercios.js -->
    </div>
  </section>

  <!-- ======== SECTION: GASTOS ======== -->
  <section id="section-gastos" class="section fade-hide" role="tabpanel" aria-label="Gastos">
    <div class="section__inner" id="gastos-content">
      <!-- Rendered by gastos.js -->
    </div>
  </section>

  <!-- ======== SECTION: CONFIG ======== -->
  <section id="section-config" class="section fade-hide" role="tabpanel" aria-label="Configuración">
    <div class="section__inner" id="config-content">
      <!-- Rendered by config.js -->
    </div>
  </section>

</main>

<!-- Toast container -->
<div id="toast-container" class="toast-container" role="status" aria-live="polite"></div>

<!-- ======== SCRIPTS (order matters) ======== -->
<!-- Data -->
<script src="js/data.js?v=5"></script>
<!-- Utilities -->
<script src="js/utils/storage.js?v=5"></script>
<script src="js/utils/dom.js?v=5"></script>
<!-- Core -->
<script src="js/i18n.js?v=5"></script>
<script src="js/store.js?v=5"></script>
<script src="js/router.js?v=5"></script>
<!-- Components -->
<script src="js/components/nav.js?v=7"></script>
<script src="js/components/comercios.js?v=11"></script>
<script src="js/components/dashboard.js?v=8"></script>
<script src="js/components/gastos.js?v=7"></script>
<script src="js/components/config.js?v=9"></script>

<!-- ======== BOOT ======== -->
<script>
(function boot() {
  'use strict';

  // Apply persisted theme
  const settings = AppStore.get('settings') || {};
  if (settings.theme) {
    document.documentElement.dataset.theme = settings.theme;
  }
  if (settings.language && window.I18N) {
    I18N.setLanguage(settings.language);
  }

  // Render navigation
  NavComponent.render();

  // Register route enter callbacks
  AppRouter.onRouteChange((route) => {
    NavComponent.updateActive(route);
    AppStore.set('currentRoute', route);
  });

  // Initialize each section when entered
  const initialized = {};

  AppRouter.onRouteChange((route) => {
    if (!initialized[route]) {
      initialized[route] = true;
      switch (route) {
        case 'dashboard':
          if (window.DashboardComponent) DashboardComponent.init();
          break;
        case 'comercios':
          if (window.ComerciosComponent) ComerciosComponent.init();
          break;
        case 'gastos':
          if (window.GastosComponent) GastosComponent.init();
          break;
        case 'config':
          if (window.ConfigComponent) ConfigComponent.init();
          break;
      }
    } else {
      // Re-render on subsequent visits
      switch (route) {
        case 'dashboard':
          if (window.DashboardComponent) DashboardComponent.refresh();
          break;
        case 'comercios':
          if (window.ComerciosComponent) ComerciosComponent.refresh();
          break;
        case 'gastos':
          if (window.GastosComponent) GastosComponent.refresh();
          break;
      }
    }
  });

  // Initialize router (triggers first route)
  AppRouter.init();

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    // "/" to focus search (only in comercios)
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      if (AppRouter.getCurrentRoute() === 'comercios') {
        e.preventDefault();
        const searchInput = document.getElementById('com-search-input');
        if (searchInput) searchInput.focus();
      }
    }
    // Escape to blur and clear search
    if (e.key === 'Escape') {
      if (document.activeElement.tagName === 'INPUT') {
        document.activeElement.blur();
      }
    }
  });
})();
</script>

</body>
</html>
